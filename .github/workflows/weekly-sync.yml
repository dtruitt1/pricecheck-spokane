name: Weekly price sync

on:
  schedule:
    # Every Sunday at 11 PM Pacific (Monday 07:00 UTC)
    # WinCo and Fred Meyer post new weekly ads Sunday evening
    - cron: '0 7 * * 1'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      source:
        description: 'Source to sync (all | walmart | ads)'
        required: false
        default: 'all'
      dry_run:
        description: 'Dry run — fetch but do not save'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit prices.json back to repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
          cache-dependency-path: pipeline/package-lock.json

      - name: Install dependencies
        working-directory: pipeline
        run: npm ci

      - name: Run sync
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          WALMART_CONSUMER_ID:  ${{ secrets.WALMART_CONSUMER_ID }}
          WALMART_PRIVATE_KEY:  ${{ secrets.WALMART_PRIVATE_KEY }}
          DB_PATH:              ./prices.db
        run: |
          SOURCE=${{ github.event.inputs.source || 'all' }}
          DRY_RUN=${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
          node sync.js --source=$SOURCE $DRY_RUN

      - name: Commit updated prices.json
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "PriceCheck Bot"
          git config user.email "pricecheck-bot@noreply"
          git add pipeline/prices.json
          git diff --staged --quiet || git commit -m "chore: weekly price sync $(date -u +%Y-%m-%d)"
          git push

      - name: Upload prices.json as artifact
        uses: actions/upload-artifact@v4
        with:
          name: prices-${{ github.run_id }}
          path: pipeline/prices.json
          retention-days: 90
